<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" routerLink="/dashboard">
      <span class="fs-4 fw-bold text-primary me-2">AP3</span>
      <span class="fs-5 text-white-50">Banking</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0" *ngIf="authService.session$ | async">
        <li class="nav-item"><a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/accounts" routerLinkActive="active">Accounts</a></li>
        
        <li class="nav-item"><a class="nav-link" routerLink="/profile" routerLinkActive="active">Profile</a></li>
        <li class="nav-item" *ngIf="authService.isAdmin()"><a class="nav-link" routerLink="/admin" routerLinkActive="active">Admin</a></li>
      </ul>
      <div class="d-flex align-items-center ms-auto">
        <ng-container *ngIf="authService.session$ | async as session; else loggedOut">
          <span class="text-white-50 me-3">Welcome, <strong>{{ session.fullName }}</strong></span>
          <button class="btn btn-outline-danger btn-sm" (click)="logout()">Logout</button>
        </ng-container>
        <ng-template #loggedOut>
          <a class="btn btn-outline-light btn-sm me-2" routerLink="/login">Login</a>
          <a class="btn btn-primary btn-sm" routerLink="/signup">Sign Up</a>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
