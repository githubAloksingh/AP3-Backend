<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">
          <h2 class="fw-bold mb-4 text-center">My Profile</h2>

          <div *ngIf="errorMessage()" class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ errorMessage() }}
          </div>

          <div *ngIf="successMessage()" class="alert alert-success alert-dismissible fade show" role="alert">
            {{ successMessage() }}
          </div>

          <div *ngIf="loading()" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>

          <form *ngIf="!loading()" (ngSubmit)="onSubmit()" #profileForm="ngForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input
                  type="text"
                  id="firstName"
                  name="firstName"
                  class="form-control rounded-3"
                  [(ngModel)]="customer.firstName"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input
                  type="text"
                  id="lastName"
                  name="lastName"
                  class="form-control rounded-3"
                  [(ngModel)]="customer.lastName"
                  required
                />
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control rounded-3 bg-light"
                [(ngModel)]="customer.email"
                readonly
                disabled
              />
              <div class="form-text">Your email address cannot be changed.</div>
            </div>

            <div class="mb-3">
              <label for="phoneNumber" class="form-label">Phone Number</label>
              <input
                type="tel"
                id="phoneNumber"
                name="phoneNumber"
                class="form-control rounded-3"
                placeholder="10-digit mobile number"
                [(ngModel)]="customer.phoneNumber"
                pattern="^[0-9]{10}$"
              />
              <div class="form-text">Must be exactly 10 digits.</div>
            </div>

            <div class="mb-4">
              <label for="address" class="form-label">Address</label>
              <textarea
                id="address"
                name="address"
                class="form-control rounded-3"
                rows="3"
                placeholder="Your address details"
                [(ngModel)]="customer.address"
              ></textarea>
            </div>

            <button
              type="submit"
              class="btn btn-primary btn-lg w-100 rounded-3"
              [disabled]="saving() || !profileForm.valid"
            >
              <span *ngIf="saving()" class="spinner-border spinner-border-sm me-2"></span>
              Save Profile Changes
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
