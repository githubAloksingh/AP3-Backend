<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">
          <h2 class="fw-bold mb-4 text-center">My Profile</h2>

          <div *ngIf="errorMessage()" class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ errorMessage() }}
          </div>

          <div *ngIf="successMessage()" class="alert alert-success alert-dismissible fade show" role="alert">
            {{ successMessage() }}
          </div>

          <div *ngIf="loading()" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>

          <form *ngIf="!loading()" (ngSubmit)="onSubmit()" #profileForm="ngForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" id="firstName" name="firstName" class="form-control rounded-3" [(ngModel)]="customer.firstName" required />
              </div>

              <div class="col-md-6 mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" id="lastName" name="lastName" class="form-control rounded-3" [(ngModel)]="customer.lastName" required />
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" id="email" name="email" class="form-control rounded-3 bg-light" [(ngModel)]="customer.email" readonly disabled />
              <div class="form-text">Your email address cannot be changed.</div>
            </div>

            <div class="mb-3">
              <label for="country" class="form-label">Country</label>
              <select id="country" name="country" class="form-select rounded-3 text-uppercase" [(ngModel)]="customer.country" required>
                <option value="INDIA">India (+91)</option>
                <option value="USA">USA (+1)</option>
                <option value="UK">UK (+44)</option>
              </select>
              <div class="form-text">Selecting country auto-applies the corresponding country code.</div>
            </div>

            <div class="mb-3">
              <label for="phoneNumber" class="form-label">Mobile Number</label>
              <div class="input-group">
                <span class="input-group-text rounded-start-3 bg-light font-monospace fw-bold">{{ phonePrefix }}</span>
                <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control rounded-end-3" placeholder="10-digit mobile number" [(ngModel)]="customer.phoneNumber" (input)="onPhoneInput($event)" maxlength="10" pattern="^[0-9]{10}$" required />
              </div>
              <div class="form-text">Numbers only, exactly 10 digits (no extra characters allowed).</div>
            </div>

            <div class="mb-3">
  <label>Address Line 1</label>
  <input
    type="text"
    class="form-control"
    [(ngModel)]="customer.addressLine1"
    name="addressLine1">
</div>

<div class="mb-3">
  <label>Address Line 2</label>
  <input
    type="text"
    class="form-control"
    [(ngModel)]="customer.addressLine2"
    name="addressLine2">
</div>

<div class="mb-3">
  <label>State</label>

  <select
      class="form-select"
      [(ngModel)]="customer.state"
      name="state"
      (change)="onStateChange()">

      <option *ngFor="let state of states" [value]="state.name">
          {{state.name}}
      </option>

  </select>
</div>

<div class="mb-3">
  <label>City</label>

  <input
      class="form-control"
      [(ngModel)]="customer.city"
      name="city">
</div>

<div class="mb-3">
  <label>Pincode</label>

  <input
      class="form-control"
      [(ngModel)]="customer.pincode"
      maxlength="6"
      name="pincode">
</div>

            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3" [disabled]="saving() || !profileForm.valid">
              <span *ngIf="saving()" class="spinner-border spinner-border-sm me-2"></span>
              Save Profile Changes
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
