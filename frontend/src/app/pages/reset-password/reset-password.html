<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4 p-md-5">
          <h2 class="fw-bold mb-2">Reset Password</h2>
          <p class="text-muted">Enter your email, current password, and a new password.</p>

          <div *ngIf="errorMessage()" class="alert alert-danger">{{ errorMessage() }}</div>
          <div *ngIf="message()" class="alert alert-success">{{ message() }}</div>

          <form [formGroup]="resetForm" (ngSubmit)="submit()" novalidate>
            <div class="mb-3">
              <label class="form-label" for="email">Email</label>
              <input id="email" type="email" class="form-control" formControlName="email" />
            </div>

            <div class="mb-3">
              <label class="form-label" for="currentPassword">Current Password</label>
              <input id="currentPassword" type="password" class="form-control" formControlName="currentPassword" />
            </div>

            <div class="mb-3">
              <label class="form-label" for="newPassword">New Password</label>
              <input id="newPassword" type="password" class="form-control" formControlName="newPassword" />
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="submitting()">
              <span *ngIf="submitting()" class="spinner-border spinner-border-sm me-2"></span>
              Update Password
            </button>
          </form>

          <div class="text-center mt-3">
            <a routerLink="/login" class="text-decoration-none">Back to login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
