<div class="row justify-content-center align-items-center min-vh-75 mt-5">
  <div class="col-md-5">
    <div class="card shadow border-0 rounded-4">
      <div class="card-body p-5">
        <h2 class="text-center fw-bold mb-4">Create Account</h2>

        <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #signupForm="ngForm">
          <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              class="form-control form-control-lg rounded-3"
              placeholder="John Doe"
              [(ngModel)]="fullName"
              required
            />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control form-control-lg rounded-3"
              placeholder="name@example.com"
              [(ngModel)]="email"
              required
            />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control form-control-lg rounded-3"
              placeholder="Choose a strong password"
              [(ngModel)]="password"
              required
              minlength="6"
            />
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-lg w-100 rounded-3 mb-3"
            [disabled]="loading || !signupForm.valid"
          >
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Register
          </button>
        </form>

        <div class="text-center mt-3">
          <span class="text-muted">Already have an account? </span>
          <a routerLink="/login" class="text-decoration-none fw-semibold">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
