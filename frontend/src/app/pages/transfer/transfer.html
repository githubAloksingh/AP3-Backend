<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
            <div>
              <h2 class="fw-bold mb-1">Transfer Money</h2>
              <p class="text-muted mb-0">Send money easily using the receiver's phone number or account number.</p>
            </div>
            <a routerLink="/transactions" class="btn btn-outline-primary btn-sm">History</a>
          </div>

          <div *ngIf="errorMessage()" class="alert alert-danger">{{ errorMessage() }}</div>
          <div *ngIf="successMessage()" class="alert alert-success">{{ successMessage() }}</div>

          <div *ngIf="loading()" class="text-center my-5">
            <div class="spinner-border text-primary" role="status"></div>
          </div>

          <form *ngIf="!loading()" [formGroup]="transferForm" (ngSubmit)="submit()" novalidate>
            <div class="mb-3">
              <label class="form-label" for="fromAccountNumber">From Account</label>
              <select id="fromAccountNumber" class="form-select rounded-3" formControlName="fromAccountNumber">
                <option value="" disabled>Select account</option>
                <option *ngFor="let account of accounts()" [value]="account.accountNumber">
                  {{ account.accountNumber }} - {{ account.accountType }} - {{ account.balance | currency:'INR':'symbol' }}
                </option>
              </select>
              <div *ngIf="transferForm.controls.fromAccountNumber.touched && transferForm.controls.fromAccountNumber.invalid" class="text-danger small mt-1">
                Sender account is required.
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="receiverPhoneNumber">Receiver Phone Number</label>
              <input id="receiverPhoneNumber" type="text" class="form-control rounded-3" formControlName="receiverPhoneNumber" placeholder="Enter receiver phone number">
              <div class="form-text">Fastest option: use the receiver's phone number to send money instantly.</div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="toAccountNumber">Receiver Account Number <span class="text-muted">(optional)</span></label>
              <input id="toAccountNumber" type="text" class="form-control rounded-3" formControlName="toAccountNumber" placeholder="Enter receiver account number if you know it">
            </div>

            <div class="mb-3">
              <label class="form-label" for="amount">Amount</label>
              <input id="amount" type="number" min="1" step="0.01" class="form-control rounded-3" formControlName="amount">
              <div *ngIf="transferForm.controls.amount.touched && transferForm.controls.amount.invalid" class="text-danger small mt-1">
                Amount must be at least 1.
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label" for="description">Description</label>
              <textarea id="description" rows="3" class="form-control rounded-3" formControlName="description" placeholder="Optional note"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3" [disabled]="submitting() || accounts().length === 0">
              <span *ngIf="submitting()" class="spinner-border spinner-border-sm me-2"></span>
              Transfer Money
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
