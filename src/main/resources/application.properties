spring.application.name=ap3-backend

# ==============================
# MySQL Database Configuration
# ==============================
# JDBC URL pointing to the local MySQL database.
spring.datasource.url=jdbc:mysql://localhost:3306/loan_management

# MySQL username.
spring.datasource.username=root

# MySQL password (do not hardcode real passwords in code/docs).
spring.datasource.password=NEwgen@220205

# MySQL JDBC driver class name (MySQL Connector/J).
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Configuration
# ==============================
# Automatically update the schema on startup (will not explicitly create tables here in code).
spring.jpa.hibernate.ddl-auto=update

# Enable SQL logging.
spring.jpa.show-sql=true

# Format SQL output for readability.
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect for MySQL.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

