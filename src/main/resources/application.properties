# =============================================================
# Banking Management System - Application Configuration
# =============================================================

# Server Configuration
server.port=8080

# =============================================================
# MySQL Database Configuration
# =============================================================
# Replace the placeholders below with your actual MySQL credentials
# before running the application.
#
# Example:
#   spring.datasource.url=jdbc:mysql://localhost:3306/banking_db
#   spring.datasource.username=root
#   spring.datasource.password=your_password
# =============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:banking_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================
# JPA / Hibernate Configuration
# =============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================================
# SQL Logging (for debugging purposes)
# =============================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE